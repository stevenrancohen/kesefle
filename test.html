function el(id) { return document.getElementById(id); }
function setStatus(id, ok, msg) {
  var row = document.getElementById('row-' + id);
  if (!row) return;
  var badge = row.querySelector('.badge');
  var detail = row.querySelector('.detail');
  if (ok === true) {
    badge.textContent = '✅ עבר';
    badge.className = 'badge inline-block rounded-full bg-emerald-100 px-3 py-1 text-sm font-bold text-emerald-700';
  } else if (ok === false) {
    badge.textContent = '❌ נכשל';
    badge.className = 'badge inline-block rounded-full bg-red-100 px-3 py-1 text-sm font-bold text-red-700';
  } else {
    badge.textContent = '⏳ ממתין';
    badge.className = 'badge inline-block rounded-full bg-slate-100 px-3 py-1 text-sm font-bold text-slate-600';
  }
  if (detail) detail.textContent = msg || '';
  updateCounts();
}
function updateCounts() {
  var pass = 0, fail = 0, pend = 0;
  document.querySelectorAll('.badge').forEach(function(b) {
    if (b.textContent.indexOf('✅') >= 0) pass++;
    else if (b.textContent.indexOf('❌') >= 0) fail++;
    else pend++;
  });
  el('pass-count').textContent = pass;
  el('fail-count').textContent = fail;
  el('pending-count').textContent = pend;
}

// Renders the test list
TESTS.forEach(function(t) {
  var row = document.createElement('div');
  row.id = 'row-' + t.id;
  row.className = 'flex items-center gap-3 rounded-2xl border border-slate-200 bg-white p-4';
  row.innerHTML =
    '<div class="flex-1">' +
      '<div class="font-bold">' + t.name + '</div>' +
      '<div class="detail mt-1 text-xs text-slate-500"></div>' +
    '</div>' +
    '<button class="rounded-xl border border-slate-200 px-3 py-1.5 text-xs font-semibold hover:bg-slate-100">▶️ בדוק</button>' +
    '<span class="badge inline-block rounded-full bg-slate-100 px-3 py-1 text-sm font-bold text-slate-600">⏳ ממתין</span>';
  row.querySelector('button').onclick = function() { setStatus(t.id, null, 'בודק…'); t.run(t.id); };
  el('test-list').appendChild(row);
});

function resetAll() {
  TESTS.forEach(function(t) { setStatus(t.id, null, ''); });
}
function runAll() {
  TESTS.forEach(function(t, i) {
    setTimeout(function() { setStatus(t.id, null, 'בודק…'); t.run(t.id); }, i * 250);
  });
}

async function fetchMain() {
  var r = await fetch('/', { credentials: 'omit' });
  if (!r.ok) throw new Error('site ' + r.status);
  return await r.text();
}

  try {
    var html = await fetchMain();
    if (html.length > 1000) setStatus(id, true, 'נטען (' + html.length + ' תווים)');
    else setStatus(id, false, 'תוכן קצר מדי');
  } catch (e) { setStatus(id, false, e.message); }
}
async function testNavLinks(id) {
  try {

    var anchors = ['#how','#features','#pricing','#faq'];

    if (missing.length === 0) setStatus(id, true, 'כל 4 הקישורים קיימים');
    else setStatus(id, false, 'חסרים: ' + missing.join(', '));
  } catch (e) { setStatus(id, false, e.message); }
}

async function testOnboardingWa(id) {
  try {
    var r = await fetch('/account');
    if (!r.ok) { setStatus(id, false, '/account לא נטען'); return; }
    var h = await r.text();
    var badHref = h.indexOf('id="btn-whatsapp"') >= 0 && h.indexOf('href="#"') >= 0 && h.match(/<a[^>]*id="btn-whatsapp"[^>]*href="#"/);
    var hasReal = h.indexOf('wa.me/15556408123') >= 0;
    setStatus(id, hasReal && !badHref, hasReal ? 'מקושר למספר אמיתי' : 'חסר קישור אמיתי');
  } catch (e) { setStatus(id, false, e.message); }
}

    var pp = r.headers.get('Permissions-Policy') || r.headers.get('permissions-policy') || '';

    var hasEmpty = pp.indexOf('microphone=()') >= 0;
    setStatus(id, !hasMic, !hasMic ? ('Permissions-Policy: ' + (hasEmpty ? 'microphone=()' : 'ללא mic') + ' ✓') : 'עדיין מתיר microphone');
  } catch (e) { setStatus(id, false, e.message); }
}

  catch (e) { setStatus(id, false, e.message); }
}

async function testPwaManifest(id) {
  try {
    var r = await fetch('/manifest.webmanifest'); var j = await r.json();
    var ok = r.ok && j && j.icons && j.icons.length >= 2 && j.start_url;
    setStatus(id, ok, ok ? 'תקין (' + j.icons.length + ' icons)' : 'manifest פגום');
  } catch (e) { setStatus(id, false, e.message); }
}
async function testServiceWorker(id) {
  try {
    var r = await fetch('/sw.js', { cache: 'no-store' });
    var t = await r.text();
    var ok = r.ok && t.indexOf('addEventListener(\'install\'') >= 0 && t.indexOf('cache') >= 0;
    setStatus(id, ok, ok ? 'נטען + יש install handler' : 'sw.js לא תקין');
  } catch (e) { setStatus(id, false, e.message); }
}
