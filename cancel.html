<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>ביטול מנוי | כספ'לה</title>
<meta name="description" content="לפני שתבטל/י את המנוי, בוא נדבר. הצעה מיוחדת + סקר קצר." />
<meta name="robots" content="noindex,nofollow">
<link rel="manifest" href="/manifest.webmanifest" />
<meta name="theme-color" content="#4f46e5" />
<link rel="icon" type="image/png" href="/logo.png" />
<link rel="apple-touch-icon" href="/icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&family=Rubik:wght@600;700;800;900&display=swap" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: { extend: {
    fontFamily: { sans: ['Heebo', 'system-ui', 'sans-serif'] },
    colors: {
      ink: { 50:'#f7f8fb', 100:'#eef0f6', 300:'#bcc4d6', 500:'#5d6b8f', 700:'#2f3b54', 800:'#1e2638', 900:'#0f1422' },
      brand: { 400:'#818cf8', 500:'#4f46e5', 600:'#4338ca', 700:'#3730a3' }
    }
  }}
};
</script>
<style>
  /* Display font (Steven 2026-05-26): Rubik 900 for headings, Behance-style. */
  h1, h2, h3 {
    font-family: 'Rubik', 'Heebo', system-ui, sans-serif;
    font-weight: 900;
    letter-spacing: -0.035em;
    line-height: 1;
  }
  h4, h5 {
    font-family: 'Rubik', 'Heebo', system-ui, sans-serif;
    font-weight: 800;
    letter-spacing: -0.02em;
  }body{font-family:'Heebo',system-ui,sans-serif}</style>
  <script src="/js/analytics-loader.js" defer></script>
</head>
<body class="bg-ink-50 dark:bg-ink-900 text-ink-900 dark:text-white min-h-screen flex flex-col">

<header class="border-b border-ink-200/40 dark:border-ink-700/40">
  <nav class="mx-auto flex max-w-6xl items-center justify-between px-5 py-3.5">
    <a href="/" class="flex items-center gap-2 font-extrabold text-lg">
      <span class="grid h-8 w-8 place-items-center rounded-xl bg-gradient-to-br from-brand-500 to-brand-700 text-white">&#x20aa;</span>
      <span>כספ'לה</span>
    </a>
    <a href="/account" class="text-sm font-semibold text-brand-600 dark:text-brand-400">חשבון →</a>
  </nav>
</header>

<main class="flex-1 px-5 py-12">
  <div class="mx-auto max-w-2xl">

    <!-- Retention offer -->
    <div id="kfl-retention" class="rounded-3xl border-2 border-brand-500 bg-brand-50 dark:bg-brand-500/10 dark:border-brand-400 p-8 shadow-soft">
      <p class="text-xs font-bold uppercase tracking-wider text-brand-700 dark:text-brand-300">לפני שתעזוב/י</p>
      <h1 class="mt-3 text-3xl md:text-4xl font-black tracking-tight">חצי מחיר. שלושה חודשים.</h1>
      <p class="mt-3 text-lg text-ink-600 dark:text-ink-200">
        אם הסיבה היא העלות, יש לנו הצעה: <strong class="text-brand-700 dark:text-brand-300">50% הנחה ל-3 חודשים הבאים</strong>.
        בלי טפסים, בלי לדבר עם נציג.
      </p>
      <div class="mt-6 flex flex-wrap gap-3">
        <button id="kfl-accept-offer" class="rounded-2xl bg-brand-600 px-6 py-3 text-base font-bold text-white hover:bg-brand-700 transition">
          קבל את ההצעה →
        </button>
        <button id="kfl-pause" class="rounded-2xl border-2 border-ink-300 dark:border-ink-700 bg-white dark:bg-ink-800 px-6 py-3 text-base font-bold hover:bg-ink-100 dark:hover:bg-ink-700 transition">
          השהה חודש במקום
        </button>
        <button id="kfl-decline-offer" class="text-sm font-semibold text-ink-500 dark:text-ink-400 hover:text-ink-700 dark:hover:text-ink-700 px-4 py-3">
          לא, תמשיך לביטול
        </button>
      </div>
    </div>

    <!-- Survey shown after decline -->
    <div id="kfl-survey" class="mt-6 rounded-3xl border border-ink-200 dark:border-ink-700 bg-white dark:bg-ink-800 p-8 hidden">
      <h2 class="text-2xl font-black">תספר לנו למה?</h2>
      <p class="mt-2 text-sm text-ink-500 dark:text-ink-400">בחר את הסיבה העיקרית. זה עוזר לנו להשתפר. (אופציונלי)</p>
      <div class="mt-6 space-y-2" id="kfl-reasons">
        <label class="flex items-center gap-3 cursor-pointer rounded-xl border border-ink-200 dark:border-ink-700 px-4 py-3 hover:bg-ink-50 dark:hover:bg-ink-700/50">
          <input type="radio" name="reason" value="too_expensive" class="accent-brand-600" />
          <span>המחיר גבוה מדי בשבילי</span>
        </label>
        <label class="flex items-center gap-3 cursor-pointer rounded-xl border border-ink-200 dark:border-ink-700 px-4 py-3 hover:bg-ink-50 dark:hover:bg-ink-700/50">
          <input type="radio" name="reason" value="missing_feature" class="accent-brand-600" />
          <span>חסרה פיצ'ר שאני צריך/ה</span>
        </label>
        <label class="flex items-center gap-3 cursor-pointer rounded-xl border border-ink-200 dark:border-ink-700 px-4 py-3 hover:bg-ink-50 dark:hover:bg-ink-700/50">
          <input type="radio" name="reason" value="not_using" class="accent-brand-600" />
          <span>פשוט לא משתמש/ת מספיק</span>
        </label>
        <label class="flex items-center gap-3 cursor-pointer rounded-xl border border-ink-200 dark:border-ink-700 px-4 py-3 hover:bg-ink-50 dark:hover:bg-ink-700/50">
          <input type="radio" name="reason" value="bugs" class="accent-brand-600" />
          <span>בעיות טכניות / באגים</span>
        </label>
        <label class="flex items-center gap-3 cursor-pointer rounded-xl border border-ink-200 dark:border-ink-700 px-4 py-3 hover:bg-ink-50 dark:hover:bg-ink-700/50">
          <input type="radio" name="reason" value="switched" class="accent-brand-600" />
          <span>עברתי לכלי אחר (איזה?)</span>
        </label>
        <label class="flex items-center gap-3 cursor-pointer rounded-xl border border-ink-200 dark:border-ink-700 px-4 py-3 hover:bg-ink-50 dark:hover:bg-ink-700/50">
          <input type="radio" name="reason" value="other" class="accent-brand-600" />
          <span>אחר</span>
        </label>
      </div>
      <textarea id="kfl-comment" placeholder="פרט/י (אופציונלי)..." rows="3" class="mt-4 w-full rounded-xl border border-ink-200 dark:border-ink-700 bg-white dark:bg-ink-900 px-4 py-3 text-sm"></textarea>
      <div class="mt-6 flex gap-3">
        <button id="kfl-confirm-cancel" class="rounded-2xl bg-red-600 px-6 py-3 text-base font-bold text-white hover:bg-red-700 transition">
          בטל את המנוי
        </button>
        <a href="/account" class="rounded-2xl border-2 border-ink-300 dark:border-ink-700 bg-white dark:bg-ink-800 px-6 py-3 text-base font-bold hover:bg-ink-100 dark:hover:bg-ink-700 transition">
          חזרה לחשבון
        </a>
      </div>
    </div>

    <!-- Success state -->
    <div id="kfl-done" class="mt-6 rounded-3xl border border-ink-200 dark:border-ink-700 bg-white dark:bg-ink-800 p-8 hidden">
      <h2 class="text-2xl font-black" id="kfl-done-title"></h2>
      <p class="mt-3 text-base text-ink-600 dark:text-ink-200" id="kfl-done-body"></p>
      <div class="mt-6 flex gap-3">
        <a href="/account" class="rounded-2xl bg-brand-600 px-6 py-3 text-base font-bold text-white hover:bg-brand-700 transition">
          חזרה לחשבון →
        </a>
      </div>
    </div>

  </div>
</main>

<footer class="border-t border-ink-200/40 dark:border-ink-700/40 px-5 py-6 text-center text-xs text-ink-500 dark:text-ink-400">
  <p>&copy; 2026 כספ'לה &middot; אבטחה &middot; <a href="/privacy" class="hover:underline">פרטיות</a> &middot; <a href="/terms" class="hover:underline">תנאים</a></p>
</footer>

<script>
(function(){
  if (localStorage.getItem('kesefle_theme') === 'dark') document.documentElement.classList.add('dark');

  function trackEvent(name, meta) {
    try {
      fetch('/api/log/funnel-event', {
        method: 'POST', credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ event: name, meta: meta || {} }),
        keepalive: true,
      }).catch(function(){});
    } catch (_e) {}
  }
  trackEvent('cancel_clicked', { source: 'cancel_page' });

  function show(id) { document.getElementById(id).classList.remove('hidden'); }
  function hide(id) { document.getElementById(id).classList.add('hidden'); }
  function setDone(title, body) {
    document.getElementById('kfl-done-title').textContent = title;
    document.getElementById('kfl-done-body').textContent = body;
    show('kfl-done');
  }

  async function postCancelAction(action, payload) {
    try {
      var r = await fetch('/api/billing/cancel-flow', {
        method: 'POST', credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(Object.assign({ action: action }, payload || {})),
      });
      var j = await r.json().catch(function(){ return { ok: false }; });
      return j;
    } catch (_e) {
      return { ok: false, error: 'network' };
    }
  }

  document.getElementById('kfl-accept-offer').addEventListener('click', async function () {
    this.disabled = true;
    this.textContent = 'מחיל...';
    var r = await postCancelAction('accept_discount', { months: 3, pct: 50 });
    hide('kfl-retention');
    if (r.ok) setDone('סבבה, ההנחה הופעלה!', '50% הנחה תיכנס לחיוב הבא שלך. נשלח אליך אישור במייל.');
    else setDone('שגיאה זמנית', 'לא הצלחנו להפעיל את ההנחה. נציג ייצור איתך קשר. (' + (r.error || 'unknown') + ')');
  });

  document.getElementById('kfl-pause').addEventListener('click', async function () {
    this.disabled = true;
    this.textContent = 'משהה...';
    var r = await postCancelAction('pause', { days: 30 });
    hide('kfl-retention');
    if (r.ok) setDone('המנוי הושהה ל-30 יום', 'תוכל לחדש בכל רגע מ-/account. בינתיים, הגיליון שלך ממשיך לעבוד וההוצאות נרשמות.');
    else setDone('שגיאה זמנית', 'נציג ייצור איתך קשר תוך 24 שעות.');
  });

  document.getElementById('kfl-decline-offer').addEventListener('click', function () {
    hide('kfl-retention');
    show('kfl-survey');
    trackEvent('cancel_clicked', { source: 'declined_offer' });
  });

  document.getElementById('kfl-confirm-cancel').addEventListener('click', async function () {
    var reason = (document.querySelector('input[name="reason"]:checked') || {}).value || 'no_reason';
    var comment = document.getElementById('kfl-comment').value.slice(0, 500);
    this.disabled = true;
    this.textContent = 'מבטל...';
    var r = await postCancelAction('cancel', { reason: reason, comment: comment });
    hide('kfl-survey');
    if (r.ok) {
      setDone('בוטל. תודה שניסית את כספ\'לה.', 'הגישה תישאר עד סוף תקופת החיוב הנוכחית. הגיליון שלך נשאר אצלך לתמיד. נחזור אליך בעוד חודש לראות איך אתה.');
    } else {
      setDone('שגיאה זמנית', 'נציג ייצור איתך קשר תוך 24 שעות. אם דחוף - info@kesefle.com');
    }
  });
})();
</script>
<script>/* SW auto-update */
if("serviceWorker" in navigator){(function(){var had=!!navigator.serviceWorker.controller,reloaded=false;navigator.serviceWorker.addEventListener("controllerchange",function(){if(reloaded||!had)return;reloaded=true;location.reload();});navigator.serviceWorker.ready.then(function(reg){try{reg.update();}catch(e){}}).catch(function(){});})();}</script>
</body>
</html>
