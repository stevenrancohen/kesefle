<script>
tailwind.config = {

  theme: { extend: {

      brand: { 400:'#38bdf8', 500:'#2563eb', 600:'#1d4ed8', 700:'#1e40af' }

};

<style>
  body { font-family: 'Heebo', system-ui, sans-serif; }
  /* Display font (Steven 2026-05-26): Rubik 900 for headings, Behance-style. */
  h1, h2, h3 {
    font-family: 'Rubik', 'Heebo', system-ui, sans-serif;
    font-weight: 900;
    letter-spacing: -0.035em;
    line-height: 1;
  }
  h4, h5 {
    font-family: 'Rubik', 'Heebo', system-ui, sans-serif;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .num { direction: ltr; unicode-bidi: isolate; display: inline-block; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
</style>
  <script src="/js/analytics-loader.js" defer></script>
</head>
<body class="bg-ink-50 dark:bg-ink-950 text-ink-900 dark:text-white min-h-screen flex flex-col">

<header class="border-b border-ink-200/40 dark:border-ink-700/40">
  <nav class="mx-auto flex max-w-6xl items-center justify-between px-5 py-3.5">
    <a href="/" class="flex items-center gap-2 font-extrabold text-lg">
      <span class="grid h-8 w-8 place-items-center rounded-xl bg-gradient-to-br from-brand-500 to-brand-700 text-white">&#x20aa;</span>
      <span class="kfl-logo-text">כספ'לה</span>
    </a>
    <a href="/dashboard" class="text-sm font-semibold text-brand-600 dark:text-brand-400">דשבורד →</a>
  </nav>
</header>

<main class="flex-1 px-5 py-10">
  <div class="mx-auto max-w-md">
    <div class="text-center mb-8">
      <p class="text-xs font-extrabold uppercase tracking-widest text-brand-600 dark:text-brand-400">קלט מהיר</p>
      <h1 class="mt-2 text-3xl md:text-4xl font-black text-ink-900 dark:text-white">הוסף הוצאה</h1>
      <p class="mt-2 text-sm text-ink-600 dark:text-ink-300">
        ישירות לגיליון שלך — בלי לפתוח וואטסאפ. נשמר תוך שנייה.
      </p>
    </div>

    <form id="kfl-form" class="rounded-3xl border border-ink-200 dark:border-ink-700 bg-white dark:bg-ink-800 p-6 shadow-soft space-y-5">

      <!-- Type toggle -->
      <div class="flex rounded-2xl border border-ink-200 dark:border-ink-700 p-1 bg-ink-50 dark:bg-ink-950">
        <button type="button" id="type-expense" class="flex-1 rounded-xl py-2 text-sm font-bold bg-red-500 text-white" onclick="kflSetType('expense')">
          💸 הוצאה
        </button>
        <button type="button" id="type-income" class="flex-1 rounded-xl py-2 text-sm font-bold text-ink-600 dark:text-ink-300" onclick="kflSetType('income')">
          💰 הכנסה
        </button>
      </div>

      <!-- Amount -->
      <div>
        <label for="kfl-amount" class="block text-xs font-bold text-ink-600 dark:text-ink-300 mb-1.5">סכום (₪)</label>
        <input id="kfl-amount" type="number" inputmode="decimal" step="0.01" min="0.01" max="100000000" required placeholder="45" autocomplete="off"
          class="w-full text-3xl font-black bg-transparent border-b-2 border-ink-200 dark:border-ink-700 focus:border-brand-500 outline-none py-2 dir-ltr" style="direction:ltr;text-align:left" />
      </div>

      <!-- Description -->
      <div>
        <label for="kfl-desc" class="block text-xs font-bold text-ink-600 dark:text-ink-300 mb-1.5">פירוט</label>
        <input id="kfl-desc" type="text" required maxlength="200" placeholder="קפה / סופר רמי לוי / שכר דירה" autocomplete="off"
          class="w-full text-base bg-transparent border-b-2 border-ink-200 dark:border-ink-700 focus:border-brand-500 outline-none py-2" />
      </div>

      <!-- Category: grouped picker matching the WhatsApp bot + sheet taxonomy
           (bot _sendChangeCategoryPicker_ / lib/categories.js). Values are the
           exact col-D category strings the dashboard SUMIFS understands, so
           the website matches WhatsApp and the sheet. Picking "אחר" reveals a
           free-text field for a brand-new category. -->
      <div>
        <label for="kfl-cat-select" class="block text-xs font-bold text-ink-600 dark:text-ink-300 mb-1.5">קטגוריה <span class="text-ink-500">(אופציונלי)</span></label>
        <select id="kfl-cat-select"
          class="w-full text-base bg-transparent border-b-2 border-ink-200 dark:border-ink-700 focus:border-brand-500 outline-none py-2 text-ink-900 dark:text-white">
          <option value="">— בחר/י קטגוריה —</option>
          <optgroup label="🍞 אוכל ופארמה">
            <option value="אוכל">אוכל</option>
            <option value="אוכל בכללי">אוכל בכללי</option>
            <option value="אוכל לבית">אוכל לבית (סופר ומכולת)</option>
            <option value="אוכל בחוץ">אוכל בחוץ (מסעדות)</option>
            <option value="קפה">קפה</option>
            <option value="אוכל מהיר">אוכל מהיר</option>
            <option value="אוכל מוכן">אוכל מוכן</option>
            <option value="אלכוהול">אלכוהול</option>
            <option value="פארמה">פארמה וטואלטיקה</option>
          </optgroup>
          <optgroup label="🏠 בית">
            <option value="חשמל">חשמל</option>
            <option value="מים וביוב">מים וביוב</option>
            <option value="גז">גז</option>
            <option value="ארנונה">ארנונה</option>
            <option value="שכר דירה">שכר דירה</option>
            <option value="משכנתה">משכנתה</option>
            <option value="ועד בית">ועד בית</option>
            <option value="תיקונים בבית">תיקונים בבית</option>
          </optgroup>
          <optgroup label="🚗 תחבורה">
            <option value="דלק">דלק</option>
            <option value="חניה">חניה</option>
            <option value="כבישי אגרה">כבישי אגרה</option>
            <option value="תחבורה ציבורית">תחבורה ציבורית</option>
            <option value="מוניות">מוניות</option>
            <option value="ביטוח רכב">ביטוח רכב</option>
            <option value="תחזוקת רכב">תחזוקת רכב</option>
            <option value="רישוי רכב">רישוי רכב</option>
          </optgroup>
          <optgroup label="🧍 אישי">
            <option value="ביגוד">ביגוד והנעלה</option>
            <option value="נעליים">נעליים</option>
            <option value="מספרה">מספרה</option>
            <option value="קוסמטיקה">קוסמטיקה</option>
            <option value="בריאות">בריאות</option>
            <option value="תרופות">תרופות</option>
            <option value="ספורט">ספורט</option>
            <option value="אופטיקה">אופטיקה</option>
          </optgroup>
          <optgroup label="🎓 חינוך וילדים">
            <option value="בית ספר">בית ספר</option>
            <option value="חוגים">חוגים</option>
            <option value="צהרון">צהרון</option>
            <option value="שיעור פרטי">שיעור פרטי</option>
            <option value="בייביסיטר">בייביסיטר</option>
            <option value="ביגוד ילדים">ביגוד ילדים</option>
            <option value="צעצועים">צעצועים</option>
            <option value="דמי כיס">דמי כיס</option>
          </optgroup>
          <optgroup label="🎬 פנאי ובידור">
            <option value="בידור">בידור</option>
            <option value="חופשות">חופשות</option>
            <option value="מתנות">מתנות</option>
            <option value="אירועים">אירועים</option>
            <option value="מנויים">מנויים</option>
            <option value="חיות מחמד">חיות מחמד</option>
          </optgroup>
          <optgroup label="💼 עסק">
            <option value="הכנסה מעסק">הכנסה מעסק</option>
            <option value="שיווק ופרסום">שיווק ופרסום</option>
            <option value="שכר עובדים">שכר עובדים</option>
            <option value="קבלן משנה">קבלן משנה</option>
            <option value="חומרי גלם">חומרי גלם</option>
            <option value="תוכנות וציוד">תוכנות וציוד</option>
            <option value="רואה חשבון">רואה חשבון</option>
            <option value="מיסים">מיסים</option>
            <option value="משלוחים עסקיים">משלוחים עסקיים</option>
            <option value="שכירות משרד">שכירות משרד</option>
          </optgroup>
          <optgroup label="💰 פיננסי">
            <option value="עמלות בנק">עמלות בנק</option>
            <option value="ריבית">ריבית</option>
            <option value="ביטוח חיים">ביטוח חיים</option>
            <option value="ביטוח לאומי">ביטוח לאומי</option>
            <option value="חיסכון">חיסכון</option>
            <option value="השקעות">השקעות</option>
            <option value="החזר הלוואה">החזר הלוואה</option>
          </optgroup>
          <optgroup label="📈 הכנסות">
            <option value="משכורת">משכורת</option>
            <option value="בונוס">בונוס</option>
            <option value="שכר דירה (הכנסה)">שכר דירה (הכנסה)</option>
            <option value="קצבאות">קצבאות</option>
            <option value="דיבידנדים">דיבידנדים</option>
            <option value="החזר מס">החזר מס</option>
          </optgroup>
          <optgroup label="✨ אחר">
            <option value="שונות">שונות</option>
            <option value="תרומות">תרומות</option>
            <option value="__custom__">➕ קטגוריה אחרת (כתוב/י)…</option>
          </optgroup>
        </select>
        <input id="kfl-cat" type="text" maxlength="60" placeholder="שם קטגוריה חופשי" autocomplete="off"
          class="mt-2 hidden w-full text-base bg-transparent border-b-2 border-ink-200 dark:border-ink-700 focus:border-brand-500 outline-none py-2 text-ink-900 dark:text-white" />
      </div>

      <!-- Date (default today) -->
      <div>
        <label for="kfl-date" class="block text-xs font-bold text-ink-600 dark:text-ink-300 mb-1.5">תאריך</label>
        <input id="kfl-date" type="date" required
          class="w-full text-base bg-transparent border-b-2 border-ink-200 dark:border-ink-700 focus:border-brand-500 outline-none py-2" />
      </div>

      <!-- VAT deductible toggle (for עוסק מורשה) -->
      <label class="flex items-center gap-3 cursor-pointer rounded-xl border border-ink-200 dark:border-ink-700 px-4 py-3 hover:bg-ink-50 dark:hover:bg-white/50">
        <input id="kfl-vat" type="checkbox" class="accent-brand-600 h-5 w-5" />
        <div class="flex-1">
          <div class="text-sm font-bold">סמן לניכוי מע״מ</div>
          <div class="text-xs text-ink-500 dark:text-ink-400">לעצמאים — יופיע בדוח השנתי ב-/tax-report</div>
        </div>
      </label>

      <button type="submit" id="kfl-submit"
        class="w-full rounded-2xl bg-brand-600 hover:bg-brand-700 transition py-4 text-lg font-black text-white shadow-glow">
        שמור בגיליון →
      </button>

      <p id="kfl-status" class="text-center text-sm min-h-[20px]"></p>
    </form>

    <!-- Recent entries saved this session — instant confirmation that the
         expense reached the sheet (the form resets after each save). -->
    <div id="kfl-recent-wrap" class="mt-6 hidden">
      <div class="flex items-center justify-between mb-2">
        <h2 class="text-sm font-extrabold text-ink-700 dark:text-ink-200">נשמרו עכשיו</h2>
        <a id="kfl-recent-sheet" href="/dashboard" target="_blank" rel="noopener" class="text-xs font-bold text-brand-600 dark:text-brand-400 hover:underline">פתח גיליון →</a>
      </div>
      <ul id="kfl-recent" class="space-y-2"></ul>
    </div>

    <p class="mt-6 text-center text-xs text-ink-500 dark:text-ink-400">
      💡 הוצאות הולכות לטאב <span class="font-mono font-bold">תנועות</span> בגיליון Google Sheets שלך.
      העדפת/ה את WhatsApp? שלח/י לבוט ב-<a href="https://wa.me/972547760643" target="_blank" rel="noopener" class="font-bold text-brand-600 dark:text-brand-400 hover:underline">+972 54-776-0643</a>.
    </p>
  </div>
</main>

<footer class="border-t border-ink-200/40 dark:border-ink-700/40 px-5 py-6 text-center text-xs text-ink-500 dark:text-ink-400 mt-12">
  <p>&copy; 2026 כספ'לה &middot; אבטחה &middot; <a href="/privacy" class="hover:underline">פרטיות</a> &middot; <a href="/dashboard" class="hover:underline">דשבורד</a></p>
</footer>

<script>
(function () {
  if (localStorage.getItem('kesefle_theme') === 'dark') document.documentElement.classList.add('dark');

  var isIncome = false;
  window.kflSetType = function (t) {
    isIncome = (t === 'income');
    var exp = document.getElementById('type-expense');
    var inc = document.getElementById('type-income');
    if (isIncome) {
      inc.className = 'flex-1 rounded-xl py-2 text-sm font-bold bg-brand-600 text-white';
      exp.className = 'flex-1 rounded-xl py-2 text-sm font-bold text-ink-600 dark:text-ink-300';
    } else {
      exp.className = 'flex-1 rounded-xl py-2 text-sm font-bold bg-red-500 text-white';
      inc.className = 'flex-1 rounded-xl py-2 text-sm font-bold text-ink-600 dark:text-ink-300';
    }
  };

  // Category picker: "__custom__" reveals the free-text field; any other
  // pick hides it. The chosen value is the col-D string the dashboard sums.
  var catSelect = document.getElementById('kfl-cat-select');
  var catCustom = document.getElementById('kfl-cat');
  catSelect.addEventListener('change', function () {
    if (catSelect.value === '__custom__') {
      catCustom.classList.remove('hidden');
      catCustom.focus();
    } else {
      catCustom.classList.add('hidden');
    }
  });
  // Resolve the effective category string from the picker (or free text).
  function kflResolveCategory() {
    if (catSelect.value === '__custom__') return catCustom.value.trim();
    return catSelect.value.trim();
  }

  // Prepend a saved entry to the "saved now" list. Built with DOM nodes +
  // textContent so user-supplied description/category can't inject HTML.
  function kflAddRecent(item) {
    var wrap = document.getElementById('kfl-recent-wrap');
    var list = document.getElementById('kfl-recent');
    if (item.sheetUrl) {
      var sheetLink = document.getElementById('kfl-recent-sheet');
      sheetLink.href = item.sheetUrl;
    }
    var li = document.createElement('li');
    li.className = 'flex items-center justify-between gap-3 rounded-2xl border border-ink-200 dark:border-ink-700 bg-white dark:bg-ink-800 px-4 py-2.5';

    var left = document.createElement('div');
    left.className = 'min-w-0';
    var desc = document.createElement('div');
    desc.className = 'truncate text-sm font-bold text-ink-900 dark:text-white';
    desc.textContent = item.rawText;
    var cat = document.createElement('div');
    cat.className = 'truncate text-xs text-ink-500 dark:text-ink-400';
    cat.textContent = item.category;
    left.appendChild(desc);
    left.appendChild(cat);

    var amt = document.createElement('div');
    amt.className = 'num shrink-0 text-sm font-black ' + (item.isIncome ? 'text-emerald-600 dark:text-emerald-400' : 'text-ink-900 dark:text-white');
    var n = Math.round(item.amount * 100) / 100;
    amt.textContent = (item.isIncome ? '+' : '') + '‎₪' + n.toLocaleString('en-US');

    li.appendChild(left);
    li.appendChild(amt);
    list.insertBefore(li, list.firstChild);
    wrap.classList.remove('hidden');
    // Keep the list short — last 8 entries this session.
    while (list.children.length > 8) list.removeChild(list.lastChild);
  }

  // Default date = today (local).
  var d = new Date();
  var dateStr = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  document.getElementById('kfl-date').value = dateStr;

  document.getElementById('kfl-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    var btn = document.getElementById('kfl-submit');
    var status = document.getElementById('kfl-status');
    var amount = parseFloat(document.getElementById('kfl-amount').value);
    var rawText = document.getElementById('kfl-desc').value.trim();
    var category = kflResolveCategory();
    var date = document.getElementById('kfl-date').value;
    var vatDeductible = document.getElementById('kfl-vat').checked;
    if (!isFinite(amount) || amount <= 0) {
      status.textContent = '✗ סכום לא תקין';
      status.style.color = '#dc2626';
      return;
    }
    if (!rawText) {
      status.textContent = '✗ נא להזין פירוט';
      status.style.color = '#dc2626';
      return;
    }
    btn.disabled = true;
    btn.textContent = 'שומר...';
    status.textContent = '';
    try {
      var r = await fetch('/api/sheet/web-append', {
        method: 'POST', credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          amount: amount,
          isIncome: isIncome,
          category: category || (isIncome ? 'הכנסות' : 'שונות'),
          rawText: rawText,
          date: date,
          vatDeductible: vatDeductible,
        }),
      });
      var j = await r.json().catch(function () { return { ok: false }; });
      if (j.ok) {
        status.innerHTML = '<span style="color:#1d4ed8;font-weight:bold">✓ נשמר בגיליון!</span>';
        // Show it in the "saved now" list for instant confirmation.
        kflAddRecent({
          amount: amount,
          isIncome: isIncome,
          category: category || (isIncome ? 'הכנסות' : 'שונות'),
          rawText: rawText,
          sheetUrl: j.spreadsheetUrl || null,
        });
        // Reset for next entry (keep date, type, category for fast repeat).
        document.getElementById('kfl-amount').value = '';
        document.getElementById('kfl-desc').value = '';
        document.getElementById('kfl-vat').checked = false;
        document.getElementById('kfl-amount').focus();
        // Fire funnel pixel for analytics.
        try {
          fetch('/api/log/funnel-event', {
            method: 'POST', credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ event: 'first_message_sent', meta: { source: 'web_form' } }),
            keepalive: true,
          }).catch(function () {});
        } catch (_e) {}
      } else if (r.status === 401) {
        status.innerHTML = '✗ <a href="/account" style="text-decoration:underline">יש להתחבר ראשית</a>';
        status.style.color = '#dc2626';
      } else if (r.status === 409 && j.error === 'no_sheet_provisioned') {
        status.innerHTML = '✗ <a href="/account" style="text-decoration:underline">היכנס וצור גיליון</a>';
        status.style.color = '#dc2626';
      } else {
        status.textContent = '✗ שגיאה: ' + (j.error || r.status) + (j.detail ? ' — ' + j.detail.slice(0, 80) : '');
        status.style.color = '#dc2626';
      }
    } catch (e) {
      status.textContent = '✗ שגיאת רשת: ' + (e.message || e);
      status.style.color = '#dc2626';
    } finally {
      btn.disabled = false;
      btn.textContent = 'שמור בגיליון →';
    }
  });
})();
</script>
<script>/* SW auto-update */
if("serviceWorker" in navigator){(function(){var had=!!navigator.serviceWorker.controller,reloaded=false;navigator.serviceWorker.addEventListener("controllerchange",function(){if(reloaded||!had)return;reloaded=true;location.reload();});navigator.serviceWorker.ready.then(function(reg){try{reg.update();}catch(e){}}).catch(function(){});})();}</script>
</body>
