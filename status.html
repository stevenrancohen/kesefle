<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: { sans: ['Heebo', 'system-ui', 'sans-serif'] },
        colors: {
          ink:    { 50:'#f7f8fb', 100:'#eef0f6', 200:'#dde1ec', 300:'#bcc4d6', 400:'#8a95b3', 500:'#5d6b8f', 600:'#41506f', 700:'#2f3b54', 800:'#1e2638', 900:'#0f1422' },
          brand:  { 500:'#22c55e', 600:'#16a34a', 700:'#15803d' },
          warn:   { 500:'#f59e0b', 600:'#d97706' },
          danger: { 500:'#dc2626', 600:'#b91c1c' }
        },
        keyframes: {
          'soft-pulse': {
            '0%, 100%': { boxShadow: '0 0 0 0 rgb(34 197 94 / 0.55)' },
            '50%':       { boxShadow: '0 0 0 10px rgb(34 197 94 / 0)' }
          },
          'warn-pulse': {
            '0%, 100%': { boxShadow: '0 0 0 0 rgb(245 158 11 / 0.55)' },
            '50%':       { boxShadow: '0 0 0 10px rgb(245 158 11 / 0)' }
          },
          'danger-pulse': {
            '0%, 100%': { boxShadow: '0 0 0 0 rgb(220 38 38 / 0.55)' },
            '50%':       { boxShadow: '0 0 0 10px rgb(220 38 38 / 0)' }
          }
        },
        animation: {
          'soft-pulse':   'soft-pulse 2s ease-out infinite',
          'warn-pulse':   'warn-pulse 2s ease-out infinite',
          'danger-pulse': 'danger-pulse 2s ease-out infinite'
        }
      }
    }
  };
</script>
<style>
  html, body { font-family: 'Heebo', system-ui, sans-serif; }
  .status-dot { width: 10px; height: 10px; border-radius: 9999px; display: inline-block; }
  .dot-op    { background: #22c55e; }
  .dot-deg   { background: #f59e0b; }
  .dot-down  { background: #dc2626; }
  .dot-unknown { background: #8a95b3; }
  .uptime-square {
    width: 8px; height: 22px; border-radius: 2px; display: inline-block; margin-inline-end: 2px;
    transition: transform .15s ease;
  }
  .uptime-square:hover { transform: scaleY(1.15); }
  .uptime-op    { background: #22c55e; }
  .uptime-deg   { background: #f59e0b; }
  .uptime-down  { background: #dc2626; }
  .uptime-na    { background: #dde1ec; }
  .dark .uptime-na { background: #2f3b54; }

  /* Card hover -> reveal last incident summary */
  .svc-card .incident-blurb {
    max-height: 0; opacity: 0; overflow: hidden;
    transition: max-height .25s ease, opacity .25s ease, margin .25s ease;
  }
  .svc-card:hover .incident-blurb,
  .svc-card:focus-within .incident-blurb {
    max-height: 80px; opacity: 1; margin-top: .5rem;
  }

  /* Skeleton shimmer on first load */
  @keyframes shimmer {
    0% { background-position: -400px 0; }
    100% { background-position: 400px 0; }
  }
  .skeleton {
    background: linear-gradient(90deg, #eef0f6 0%, #f7f8fb 50%, #eef0f6 100%);
    background-size: 800px 100%;
    animation: shimmer 1.4s linear infinite;
  }
  .dark .skeleton {
    background: linear-gradient(90deg, #1e2638 0%, #2f3b54 50%, #1e2638 100%);
    background-size: 800px 100%;
  }

<script>
(function () {
  'use strict';

  // ---- Dark mode ---------------------------------------------------------
  const themeKey = 'kesefle-theme';
  function applyTheme(t) {
    if (t === 'dark') document.documentElement.classList.add('dark');
    else document.documentElement.classList.remove('dark');
  }
  const savedTheme = localStorage.getItem(themeKey)
    || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  applyTheme(savedTheme);
  document.getElementById('theme-toggle').addEventListener('click', () => {
    const next = document.documentElement.classList.contains('dark') ? 'light' : 'dark';
    localStorage.setItem(themeKey, next);
    applyTheme(next);
  });

  // ---- Service definitions ----------------------------------------------
  // status: 'op' | 'deg' | 'down' | 'unknown'
  const services = [
    { id: 'site',    name: 'אתר ראשי',     hint: 'kesefle.vercel.app',     live: true  },
    { id: 'bot',     name: 'בוט WhatsApp', hint: 'Meta Cloud API webhook', live: false },
    { id: 'sheets',  name: 'גוגל גליונות', hint: 'Sheets API',             live: true  },
    { id: 'kv',      name: 'מסד נתונים',   hint: 'Vercel KV',              live: true  },
    { id: 'stripe',  name: 'תשלומים',     hint: 'Stripe',                  live: false },
    { id: 'oauth',   name: 'כניסה',       hint: 'Google OAuth',            live: true  }
  ];

  // ---- Local history (30-day uptime bar) --------------------------------
  const HIST_KEY = 'kesefle-status-history-v1';
  const DAY_MS = 24 * 60 * 60 * 1000;
  const HIST_DAYS = 30;

  function loadHistory() {
    try { return JSON.parse(localStorage.getItem(HIST_KEY) || '{}'); }
    catch { return {}; }
  }
  function saveHistory(h) {
    try { localStorage.setItem(HIST_KEY, JSON.stringify(h)); } catch {}
  }
  function dayKey(ts) {
    const d = new Date(ts);
    return `${d.getUTCFullYear()}-${String(d.getUTCMonth() + 1).padStart(2, '0')}-${String(d.getUTCDate()).padStart(2, '0')}`;
  }
  function recordHistory(statusBySvc) {
    const hist = loadHistory();
    const today = dayKey(Date.now());
    const cutoff = Date.now() - HIST_DAYS * DAY_MS;
    Object.keys(statusBySvc).forEach(id => {
      const s = statusBySvc[id];
      if (!hist[id]) hist[id] = {};
      // Worst-status-of-day wins: down > deg > op
      const rank = { op: 1, deg: 2, down: 3, unknown: 0 };
      const prev = hist[id][today];
      if (!prev || rank[s] > rank[prev]) hist[id][today] = s;
      // prune
      Object.keys(hist[id]).forEach(k => {
        const t = Date.parse(k + 'T00:00:00Z');
        if (!t || t < cutoff) delete hist[id][k];
      });
    });
    saveHistory(hist);
  }
  function uptimeSquares(id) {
    const hist = loadHistory()[id] || {};
    const out = [];
    for (let i = HIST_DAYS - 1; i >= 0; i--) {
      const k = dayKey(Date.now() - i * DAY_MS);
      const v = hist[k];
      const cls = v === 'op' ? 'uptime-op'
        : v === 'deg' ? 'uptime-deg'
        : v === 'down' ? 'uptime-down'
        : 'uptime-na';
      const label = v
        ? `${k} — ${v === 'op' ? 'פעיל' : v === 'deg' ? 'מופחת' : 'לא פעיל'}`
        : `${k} — אין נתונים`;
      out.push(`<span class="uptime-square ${cls}" title="${label}" aria-label="${label}"></span>`);
    }
    return out.join('');
  }

  // ---- Incident log -----------------------------------------------------
  const INC_KEY = 'kesefle-incidents-v1';
  function loadIncidents() {
    try { return JSON.parse(localStorage.getItem(INC_KEY) || '[]'); }
    catch { return []; }
  }
  function saveIncidents(arr) {
    try { localStorage.setItem(INC_KEY, JSON.stringify(arr)); } catch {}
  }

  // Track currently-open incidents by service id
  function reconcileIncidents(statusBySvc, svcMeta) {
    const incidents = loadIncidents();
    const now = Date.now();
    const openByService = {};
    incidents.forEach(i => { if (!i.resolved_at) openByService[i.service_id] = i; });

    Object.keys(statusBySvc).forEach(id => {
      const s = statusBySvc[id];
      const meta = svcMeta.find(m => m.id === id);
      if (!meta) return;
      const open = openByService[id];
      if (s === 'down' || s === 'deg') {
        if (!open) {
          incidents.unshift({
            id: `${id}-${now}`,
            service_id: id,
            service_name: meta.name,
            severity: s,
            started_at: now,
            resolved_at: null,
            summary: s === 'down' ? 'השירות אינו זמין' : 'ביצועים מופחתים'
          });
        } else if (open.severity !== s) {
          open.severity = s;
          open.summary = s === 'down' ? 'השירות אינו זמין' : 'ביצועים מופחתים';
        }
      } else if (s === 'op' && open) {
        open.resolved_at = now;
      }
    });
    // Keep newest 50
    saveIncidents(incidents.slice(0, 50));
    return incidents;
  }

  function fmtTime(ts) {
    try {
      return new Date(ts).toLocaleString('he-IL', {
        day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'
      });
    } catch { return String(ts); }
  }
  function fmtDuration(ms) {
    const m = Math.round(ms / 60000);
    if (m < 60) return `${m} דק'`;
    const h = Math.floor(m / 60), mm = m % 60;
    if (h < 24) return `${h} שע' ${mm} דק'`;
    const d = Math.floor(h / 24);
    return `${d} ימים`;
  }

  // ---- Status mapping ---------------------------------------------------
  // Map /api/health → per-service status. Returns { statusBySvc, incidentReasons }.
  function mapHealth(health) {
    const out = {};
    const reasons = {}; // service_id -> string

    // 1) site — if we got here, page served. If fetch succeeded, site is up.
    out.site = health ? 'op' : 'down';
    if (!health) reasons.site = 'לא ניתן ליצור קשר עם /api/health';

    // 2) sheets
    if (health) {
      const sheets = health.deps && health.deps.sheets_api;
      out.sheets = sheets && sheets.ok ? 'op' : (sheets ? 'down' : 'unknown');
      if (sheets && !sheets.ok) reasons.sheets = `Sheets API שגיאה (${sheets.status || sheets.error || ''})`;
    } else { out.sheets = 'unknown'; }

    // 3) kv (database)
    if (health) {
      const kv = health.deps && health.deps.kv;
      const kvEnv = health.env_configured && health.env_configured.kv;
      if (!kvEnv) { out.kv = 'deg'; reasons.kv = 'משתני סביבה חסרים'; }
      else if (kv && kv.ok) out.kv = 'op';
      else { out.kv = 'down'; reasons.kv = `KV שגיאה (${kv && (kv.status || kv.error) || ''})`; }
    } else { out.kv = 'unknown'; }

    // 4) oauth (login)
    if (health) {
      const oauth = health.deps && health.deps.google_oauth;
      const env = health.env_configured || {};
      const envOk = env.google_client_id && env.google_client_secret;
      if (!envOk) { out.oauth = 'deg'; reasons.oauth = 'מפתחות OAuth לא מוגדרים'; }
      else if (oauth && oauth.ok) out.oauth = 'op';
      else { out.oauth = 'down'; reasons.oauth = `Google OAuth שגיאה (${oauth && (oauth.status || oauth.error) || ''})`; }
    } else { out.oauth = 'unknown'; }

    // 5) bot — env-based (no live probe of Meta from server)
    if (health) {
      const env = health.env_configured || {};
      const allMeta = env.meta_verify_token && env.meta_app_secret && env.meta_phone_number_id && env.meta_access_token;
      if (allMeta) out.bot = 'op';
      else {
        const some = env.meta_verify_token || env.meta_app_secret || env.meta_phone_number_id || env.meta_access_token;
        if (some) { out.bot = 'deg'; reasons.bot = 'תצורת Meta חלקית'; }
        else      { out.bot = 'deg'; reasons.bot = 'תצורת Meta לא הוגדרה'; }
      }
    } else { out.bot = 'unknown'; }

    // 6) stripe — env-based
    if (health) {
      const env = health.env_configured || {};
      const ok = env.stripe_secret_key && env.stripe_webhook_secret;
      if (ok) out.stripe = 'op';
      else if (env.stripe_secret_key || env.stripe_webhook_secret) { out.stripe = 'deg'; reasons.stripe = 'תצורת Stripe חלקית'; }
      else { out.stripe = 'deg'; reasons.stripe = 'תצורת Stripe לא הוגדרה'; }
    } else { out.stripe = 'unknown'; }

    return { statusBySvc: out, reasons };
  }

  // ---- Render -----------------------------------------------------------
  function statusBadge(s) {
    if (s === 'op')   return { dot: 'dot-op',    text: 'פעיל',              cls: 'text-brand-700 dark:text-brand-500',  pulse: 'animate-soft-pulse' };
    if (s === 'deg')  return { dot: 'dot-deg',   text: 'ביצועים מופחתים',  cls: 'text-warn-600 dark:text-warn-500',    pulse: 'animate-warn-pulse' };
    if (s === 'down') return { dot: 'dot-down',  text: 'לא פעיל',           cls: 'text-danger-600 dark:text-danger-500', pulse: 'animate-danger-pulse' };
    return { dot: 'dot-unknown', text: 'ממתין לנתונים', cls: 'text-ink-400', pulse: '' };
  }

  function renderServices(statusBySvc, reasons) {
    const root = document.getElementById('services');
    const cards = services.map(svc => {
      const s = statusBySvc[svc.id] || 'unknown';
      const b = statusBadge(s);
      const liveBadge = svc.live
        ? '<span class="text-[10px] uppercase tracking-wider text-brand-600 dark:text-brand-500 font-semibold">בדיקה חיה</span>'
        : '<span class="text-[10px] uppercase tracking-wider text-ink-400 dark:text-ink-500 font-semibold">תצורה</span>';
      const reason = reasons[svc.id]
        ? `<div class="incident-blurb text-xs text-ink-500 dark:text-ink-300 border-t border-ink-100 dark:border-ink-700 pt-2">${reason_escape(reasons[svc.id])}</div>`
        : `<div class="incident-blurb text-xs text-ink-400 dark:text-ink-500 border-t border-ink-100 dark:border-ink-700 pt-2">אין דיווחים פעילים.</div>`;
      return `
        <article class="svc-card rounded-xl border border-ink-100 dark:border-ink-800 bg-white dark:bg-ink-800 p-4 sm:p-5 hover:shadow-md focus-within:shadow-md transition" tabindex="0" aria-label="${svc.name} — ${b.text}">
          <header class="flex items-start justify-between gap-3">
            <div>
              <h3 class="text-base sm:text-lg font-bold">${svc.name}</h3>
              <p class="text-xs text-ink-500 dark:text-ink-300 mt-0.5">${svc.hint}</p>
            </div>
            <div class="flex items-center gap-2 ${b.cls}">
              <span class="status-dot ${b.dot} ${b.pulse}"></span>
              <span class="text-sm font-semibold">${b.text}</span>
            </div>
          </header>
          <div class="mt-4 flex items-end justify-between gap-3">
            <div class="flex items-center" aria-label="30 ימים אחרונים">${uptimeSquares(svc.id)}</div>
            ${liveBadge}
          </div>
          ${reason}
        </article>
      `;
    });
    root.innerHTML = cards.join('');
  }

  function reason_escape(s) {
    return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }

  function renderOverall(statusBySvc) {
    const values = Object.values(statusBySvc);
    const anyDown = values.includes('down');
    const anyDeg = values.includes('deg');
    const section = document.getElementById('overall');
    const dot = document.getElementById('overall-dot');
    const title = document.getElementById('overall-title');
    const sub = document.getElementById('overall-sub');

    section.className = section.className.replace(/border-\S+|bg-\S+/g, '').trim();
    section.classList.add('rounded-2xl','p-6','sm:p-8','flex','items-center','gap-4','sm:gap-5','shadow-sm','border','transition');

    dot.className = 'status-dot';
    dot.style.width = '22px'; dot.style.height = '22px';

    if (anyDown) {
      section.classList.add('border-danger-500/30','bg-danger-500/10');
      dot.classList.add('dot-down','animate-danger-pulse');
      title.textContent = 'תקלה זוהתה ⚠';
      sub.textContent = 'חלק מהשירותים אינם זמינים. ראו פירוט בכרטיסיות.';
    } else if (anyDeg) {
      section.classList.add('border-warn-500/30','bg-warn-500/10');
      dot.classList.add('dot-deg','animate-warn-pulse');
      title.textContent = 'ביצועים מופחתים';
      sub.textContent = 'חלק מהשירותים פועלים באופן חלקי.';
    } else {
      section.classList.add('border-brand-500/30','bg-brand-500/10');
      dot.classList.add('dot-op','animate-soft-pulse');
      title.textContent = 'כל המערכות תקינות ✓';
      sub.textContent = 'כל השירותים פעילים כרגע.';
    }
  }

  function renderIncidents(incidents) {
    const root = document.getElementById('incidents');
    if (!incidents.length) {
      root.innerHTML = `
        <div class="p-6 text-center">
          <p class="text-sm text-ink-500 dark:text-ink-300">אין תקלות פעילות</p>
          <p class="text-xs text-ink-400 dark:text-ink-500 mt-1">מצב נקי. אנחנו עוקבים אחר השירותים בכל 60 שניות.</p>
        </div>`;
      return;
    }
    const rows = incidents.slice(0, 20).map(i => {
      const sev = i.severity === 'down' ? { text: 'הפסקה', cls: 'text-danger-600 dark:text-danger-500', dot: 'dot-down' }
                : { text: 'מופחת', cls: 'text-warn-600 dark:text-warn-500', dot: 'dot-deg' };
      const state = i.resolved_at
        ? `<span class="text-xs text-brand-600 dark:text-brand-500 font-semibold">נפתרה</span>`
        : `<span class="text-xs text-danger-600 dark:text-danger-500 font-semibold">פעילה</span>`;
      const duration = i.resolved_at
        ? `· משך: ${fmtDuration(i.resolved_at - i.started_at)}`
        : `· נמשכת ${fmtDuration(Date.now() - i.started_at)}`;
      return `
        <article class="p-4 sm:p-5 flex items-start gap-3">
          <span class="status-dot ${sev.dot} mt-2"></span>
          <div class="flex-1 min-w-0">
            <div class="flex items-center flex-wrap gap-2">
              <h3 class="font-semibold">${reason_escape(i.service_name)}</h3>
              <span class="text-xs ${sev.cls} font-semibold">${sev.text}</span>
              ${state}
            </div>
            <p class="text-sm text-ink-500 dark:text-ink-300 mt-1">${reason_escape(i.summary)}</p>
            <p class="text-xs text-ink-400 dark:text-ink-500 mt-1">${fmtTime(i.started_at)} ${duration}</p>
          </div>
        </article>
      `;
    }).join('');
    root.innerHTML = rows;
  }

  function setLastUpdated(ts, ok) {
    const el = document.getElementById('last-updated');
    const t = new Date(ts).toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    el.textContent = `עודכן: ${t}${ok ? '' : ' · שגיאה ברענון'}`;
  }

  // ---- Fetch loop -------------------------------------------------------
  let refreshing = false;
  async function refresh() {
    if (refreshing) return;
    refreshing = true;
    let health = null;
    try {
      const r = await fetch('/api/health', { headers: { 'Accept': 'application/json' }, cache: 'no-store' });
      if (r.ok || r.status === 503) health = await r.json();
      else health = null;
    } catch (e) {
      health = null;
    }

    const { statusBySvc, reasons } = mapHealth(health);
    recordHistory(statusBySvc);
    const incidents = reconcileIncidents(statusBySvc, services);

    renderOverall(statusBySvc);
    renderServices(statusBySvc, reasons);
    renderIncidents(incidents);
    setLastUpdated(Date.now(), !!health);
    refreshing = false;
  }

  document.getElementById('refresh-btn').addEventListener('click', refresh);

  // Initial + every 60s
  refresh();
  setInterval(refresh, 60_000);

  // Pause when tab hidden, refresh immediately when back
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) refresh();
  });

  // ---- Subscribe form (client-only stub) --------------------------------
  document.getElementById('subscribe-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const email = document.getElementById('subscribe-email').value.trim();
    const msg = document.getElementById('subscribe-msg');
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      msg.textContent = 'נא להזין כתובת תקינה';
      msg.className = 'text-xs text-danger-600 mt-2';
      return;
    }
    // Best-effort: post to waitlist endpoint if available; otherwise localStorage.
    try {
      const key = 'kesefle-status-subs';
      const list = JSON.parse(localStorage.getItem(key) || '[]');
      if (!list.includes(email)) list.push(email);
      localStorage.setItem(key, JSON.stringify(list));
    } catch {}
    fetch('/api/events?action=waitlist', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, source: 'status' })
    }).catch(() => {});
    msg.textContent = 'תודה! נעדכן אתכם בכל שינוי בסטטוס.';
    msg.className = 'text-xs text-brand-600 dark:text-brand-500 mt-2';
    e.target.reset();
  });
})();
</script>
<script>if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("/sw.js",{scope:"/"}).catch(function(){});});}</script>
</body>
