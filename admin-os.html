<!DOCTYPE html>
<html lang="he" dir="rtl" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="robots" content="noindex,nofollow" />
  <title>מערכת ניהול — כספ'לה</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Rubik:wght@600;700;800;900&family=Heebo:wght@400;500;600;700;800;900&display=swap" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
  <link rel="stylesheet" href="/css/brand.css" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: {
        fontFamily: {
          sans: ['Inter', 'Heebo', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
          display: ['Rubik', 'Heebo', 'system-ui', 'sans-serif'],
        },
        colors: {
          ink:    { 50:'#f7f8fb',100:'#eef0f6',200:'#dde1ec',300:'#bcc4d6',400:'#8a95b3',500:'#5d6b8f',600:'#41506f',700:'#2f3b54',800:'#1e2638',900:'#0f1422',950:'#070b16' },
          brand:  { 50:'#f0f9ff',100:'#e0f2fe',200:'#bae6fd',300:'#7dd3fc',400:'#38bdf8',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a' },
          accent: { 400:'#38bdf8',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8' },
        },
      } },
    };
  </script>
  <style>
    h1,h2,h3{font-family:'Rubik','Heebo',system-ui,sans-serif;font-weight:900;letter-spacing:-0.035em;line-height:1}
    body{font-family:'Inter','Heebo',system-ui,sans-serif;background:#f7f8fb;color:#0f1422}
    html.dark body{background:#070b16;color:#eaf1fb}
    .card{background:#fff;border:1px solid #eef0f6;border-radius:1rem;box-shadow:0 1px 2px rgba(15,20,34,.04)}
    html.dark .card{background:#1e2638;border-color:#2f3b54}
    .navlink{display:flex;align-items:center;gap:.6rem;padding:.5rem .75rem;border-radius:.7rem;font-size:.9rem;font-weight:600;color:#41506f;cursor:pointer}
    .navlink:hover{background:#eef0f6}
    html.dark .navlink{color:#bcc4d6}
    html.dark .navlink:hover{background:#2f3b54}
    .navlink.active{background:#e0f2fe;color:#1d4ed8}
    html.dark .navlink.active{background:#1e293b;color:#7dd3fc}
    .kbd{font-family:ui-monospace,monospace;font-size:.7rem;border:1px solid #dde1ec;border-radius:.35rem;padding:.05rem .35rem;color:#5d6b8f}
    html.dark .kbd{border-color:#2f3b54;color:#8a95b3}
    .skel{background:linear-gradient(90deg,#eef0f6 25%,#f7f8fb 37%,#eef0f6 63%);background-size:400% 100%;animation:sk 1.2s ease-in-out infinite;border-radius:.5rem}
    html.dark .skel{background:linear-gradient(90deg,#1e2638 25%,#2f3b54 37%,#1e2638 63%);background-size:400% 100%}
    @keyframes sk{0%{background-position:100% 0}100%{background-position:-100% 0}}
    ::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:#dde1ec;border-radius:8px}
    html.dark ::-webkit-scrollbar-thumb{background:#2f3b54}
  </style>
</head>
<body class="min-h-screen">
  <!-- Shell -->
  <div class="flex min-h-screen">
    <!-- Sidebar (right in RTL) -->
    <aside id="sidebar" class="fixed inset-y-0 right-0 z-50 w-64 -translate-x-0 border-l border-ink-100 dark:border-ink-700 bg-white dark:bg-ink-900 hidden md:flex md:flex-col">
      <div class="flex items-center gap-2 px-4 py-4 border-b border-ink-100 dark:border-ink-700">
        <span class="grid h-9 w-9 place-items-center rounded-xl bg-gradient-to-br from-brand-500 to-teal-400 text-white font-black">כ</span>
        <div><div class="font-display text-lg leading-none">כספ'לה</div><div class="text-[11px] text-ink-400">מערכת ניהול</div></div>
      </div>
      <nav id="nav" class="flex-1 overflow-y-auto px-3 py-3 space-y-1"></nav>
      <a href="/" class="m-3 rounded-xl border border-ink-100 dark:border-ink-700 px-3 py-2 text-center text-sm font-semibold text-ink-600 dark:text-ink-300 hover:bg-ink-50 dark:hover:bg-ink-800">← חזרה לאתר</a>
    </aside>

    <!-- Main -->
    <div class="flex-1 md:mr-64 flex flex-col min-w-0">
      <header class="sticky top-0 z-30 flex items-center gap-3 border-b border-ink-100 dark:border-ink-700 bg-white/80 dark:bg-ink-900/80 backdrop-blur px-4 py-3">
        <button id="menuBtn" class="md:hidden rounded-lg border border-ink-100 dark:border-ink-700 p-2" aria-label="תפריט">☰</button>
        <h1 id="pageTitle" class="font-display text-xl flex-1 truncate">סקירה</h1>
        <button id="cmdBtn" class="hidden sm:flex items-center gap-2 rounded-xl border border-ink-100 dark:border-ink-700 px-3 py-1.5 text-sm text-ink-500 hover:bg-ink-50 dark:hover:bg-ink-800">חיפוש <span class="kbd">⌘K</span></button>
        <button id="refreshBtn" class="rounded-lg border border-ink-100 dark:border-ink-700 p-2 text-ink-500 hover:bg-ink-50 dark:hover:bg-ink-800" title="רענון" aria-label="רענון">⟳</button>
        <button id="themeBtn" class="rounded-lg border border-ink-100 dark:border-ink-700 p-2 text-ink-500 hover:bg-ink-50 dark:hover:bg-ink-800" title="מצב כהה/בהיר" aria-label="מצב תצוגה">◐</button>
        <span id="whoami" class="hidden sm:block max-w-[180px] truncate text-xs text-ink-400"></span>
      </header>
      <main id="view" class="flex-1 p-4 md:p-6 max-w-7xl w-full mx-auto"></main>
      <footer class="px-4 py-3 text-center text-[11px] text-ink-400">כל הנתונים אמיתיים ועדכניים — אין נתוני דמו · <span id="srcStamp"></span></footer>
    </div>
  </div>

  <!-- Mobile drawer backdrop -->
  <div id="backdrop" class="fixed inset-0 z-40 hidden bg-black/40"></div>

  <!-- Command bar -->
  <div id="cmd" class="fixed inset-0 z-50 hidden bg-black/40 p-4 sm:pt-24">
    <div class="mx-auto max-w-xl card overflow-hidden">
      <input id="cmdInput" type="text" placeholder="חיפוש מסכים, פעולות, משתמשים…" class="w-full border-0 bg-transparent px-4 py-3 text-base outline-none placeholder:text-ink-400" />
      <div id="cmdList" class="max-h-80 overflow-y-auto border-t border-ink-100 dark:border-ink-700"></div>
    </div>
  </div>

  <script>
  'use strict';
  // ───────── auth + fetch (identical pattern to admin.html) ─────────
  function token(){ try { return (JSON.parse(localStorage.getItem('kesefle_user')||'{}')).idToken || ''; } catch(e){ return ''; } }
  function authHeaders(extra){ var t=token(); var h=Object.assign({},extra||{}); if(t) h['Authorization']='Bearer '+t; return h; }
  function AuthError(){ var e=new Error('auth'); e.isAuth=true; return e; }
  async function adminGet(path){
    var r=await fetch(path,{credentials:'include',headers:authHeaders()});
    if(r.status===401||r.status===403) throw AuthError();
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.json();
  }
  async function adminPost(path,body){
    var r=await fetch(path,{method:'POST',credentials:'include',headers:authHeaders({'Content-Type':'application/json'}),body:JSON.stringify(body||{})});
    if(r.status===401||r.status===403) throw AuthError();
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.json();
  }
  // ───────── tiny DOM helpers ─────────
  var $=function(s,r){return (r||document).querySelector(s);};
  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
  // URL-scheme allowlist (defense-in-depth): permit only http/https and relative paths; reject javascript:/data:/etc. Returns '#' for unsafe input.
  function safeUrl(u){ var s=String(u==null?'':u).trim(); if(!s) return '#'; if(/^(https?:)?\/\//i.test(s)) return s; if(/^[\/#?]/.test(s)) return s; if(/^[a-z][a-z0-9+.-]*:/i.test(s)) return '#'; return s; }
  function num(n){ if(n==null||isNaN(n)) return '—'; return Number(n).toLocaleString('he-IL'); }
  function money(n,cur){ if(n==null||isNaN(n)) return '—'; return (cur==='usd'?'$':'₪')+Number(n).toLocaleString('he-IL'); }
  function ago(ts){ if(!ts) return '—'; var d=Date.now()-(typeof ts==='number'?ts:Date.parse(ts)); if(isNaN(d)) return '—'; var m=Math.round(d/60000); if(m<60) return m+' דק׳'; var h=Math.round(m/60); if(h<24) return h+' שע׳'; return Math.round(h/24)+' ימ׳'; }
  function pill(text,tone){ var t={ok:'bg-green-50 text-green-700 dark:bg-green-900/30 dark:text-green-300',warn:'bg-amber-50 text-amber-700 dark:bg-amber-900/30 dark:text-amber-300',crit:'bg-red-50 text-red-700 dark:bg-red-900/30 dark:text-red-300',info:'bg-brand-50 text-brand-700 dark:bg-ink-700 dark:text-brand-200',neutral:'bg-ink-100 text-ink-600 dark:bg-ink-700 dark:text-ink-300'}[tone||'neutral']; return '<span class="inline-block rounded-full px-2 py-0.5 text-[11px] font-semibold '+t+'">'+esc(text)+'</span>'; }
  function card(inner,cls){ return '<div class="card p-4 '+(cls||'')+'">'+inner+'</div>'; }
  function kpi(label,value,sub,tone){ return '<div class="card p-4"><div class="text-xs font-semibold text-ink-400">'+esc(label)+'</div><div class="mt-1 font-display text-3xl">'+value+'</div><div class="mt-1 text-xs '+(tone==='crit'?'text-red-500':tone==='warn'?'text-amber-600':'text-ink-400')+'">'+(sub||'')+'</div></div>'; }
  // Inline SVG sparkline from a numeric series (oldest→newest, left→right). Pure render — no fabrication.
  function sparkline(values,opts){
    opts=opts||{}; var vals=(values||[]).map(function(n){return Number(n)||0;}); if(!vals.length) return '';
    var w=opts.w||240,h=opts.h||40,pad=2; var max=Math.max.apply(null,vals),min=Math.min.apply(null,vals); var span=(max-min)||1;
    var stepX=vals.length>1?(w-pad*2)/(vals.length-1):0;
    var pts=vals.map(function(v,i){ var x=pad+i*stepX; var y=h-pad-((v-min)/span)*(h-pad*2); return x.toFixed(1)+','+y.toFixed(1); });
    var color=opts.color||'#3b82f6'; var lastX=(pad+(vals.length-1)*stepX).toFixed(1);
    var areaD='M'+pts.join(' L')+' L'+lastX+','+(h-pad)+' L'+pad+','+(h-pad)+' Z';
    return '<svg viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none" class="w-full" style="height:'+h+'px" aria-hidden="true">'+
      '<path d="'+areaD+'" fill="'+color+'" fill-opacity="0.08"/>'+
      '<polyline points="'+pts.join(' ')+'" fill="none" stroke="'+color+'" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/></svg>';
  }
  function trendCard(label,values){
    var vals=(values||[]).map(function(n){return Number(n)||0;}); var has=vals.some(function(v){return v>0;});
    var total=vals.reduce(function(s,v){return s+v;},0);
    return '<div class="card p-4"><div class="flex items-baseline justify-between gap-2"><div class="text-xs font-semibold text-ink-400">'+esc(label)+'</div><div class="font-display text-xl">'+num(total)+'</div></div>'+
      (has?'<div class="mt-2">'+sparkline(vals)+'</div>':'<div class="mt-3 text-[11px] text-ink-400">אין נתונים בחלון זה</div>')+'</div>';
  }
  function loading(){ return '<div class="grid gap-3 sm:grid-cols-2 lg:grid-cols-4">'+Array(4).fill('<div class="card p-4"><div class="skel h-3 w-20"></div><div class="skel mt-3 h-8 w-24"></div></div>').join('')+'</div>'; }
  function emptyState(t){ return card('<div class="py-8 text-center text-ink-400"><div class="text-2xl">∅</div><div class="mt-2 text-sm">'+esc(t||'אין נתונים עדיין')+'</div></div>'); }
  function errState(e){ if(e&&e.isAuth) return card('<div class="py-8 text-center"><div class="text-sm font-semibold">צריך להתחבר כמנהל</div><div class="mt-1 text-xs text-ink-400">התחבר/י עם חשבון אדמין מאושר ב-<a class="text-brand-600 underline" href="/account?next='+encodeURIComponent(location.pathname+location.hash)+'">/account</a> (באותו דפדפן), ואז רענן/י.</div></div>'); return card('<div class="py-6 text-center text-sm text-red-500">שגיאה בטעינה: '+esc(e&&e.message||e)+'</div>'); }
  function sectionTitle(t,sub){ return '<div class="mb-4"><h2 class="font-display text-2xl">'+esc(t)+'</h2>'+(sub?'<p class="mt-1 text-sm text-ink-400">'+esc(sub)+'</p>':'')+'</div>'; }

  // ───────── sections registry (groups mirror the SRC admin) ─────────
  var SECTIONS=[
    {id:'',label:'סקירה',group:'סקירה',icon:'◎',title:'סקירה',render:renderOverview},
    {id:'users',label:'משתמשים',group:'יומיומי',icon:'◍',title:'משתמשים',render:renderUsers},
    {id:'needs-review',label:'טעון בדיקה',group:'יומיומי',icon:'⚑',title:'טעון בדיקה',render:renderNeedsReview},
    {id:'conversations',label:'שיחות',group:'יומיומי',icon:'❝',title:'שיחות',render:renderConversations},
    {id:'bot-health',label:'בריאות הבוט',group:'בריאות ונתונים',icon:'♥',title:'בריאות הבוט',render:renderBotHealth},
    {id:'data-integrity',label:'תקינות נתונים',group:'בריאות ונתונים',icon:'⛃',title:'תקינות נתונים',render:renderDataIntegrity},
    {id:'quota',label:'מכסות KV/Sheets',group:'בריאות ונתונים',icon:'▣',title:'מכסות',render:renderQuota},
    {id:'activation',label:'הפעלה ושימור',group:'צמיחה',icon:'↗',title:'הפעלה ושימור',render:renderActivation},
    {id:'funnel',label:'משפך',group:'צמיחה',icon:'⧗',title:'משפך הרשמה',render:renderFunnel},
    {id:'revenue',label:'הכנסות',group:'צמיחה',icon:'₪',title:'הכנסות',render:renderRevenue},
    {id:'referrals',label:'הפניות',group:'צמיחה',icon:'⇲',title:'הפניות',render:renderReferrals},
    {id:'myagents',label:'הסוכנים שלי',group:'מערכת',icon:'✸',title:'הסוכנים שלי',render:renderMyAgents},
    {id:'agents',label:'אוטומציות',group:'מערכת',icon:'⚙',title:'אוטומציות ומשרות',render:renderAgents},
    {id:'flags',label:'דגלי פיצ׳רים',group:'מערכת',icon:'⚐',title:'דגלי פיצ׳רים',render:renderFlags},
    {id:'audit',label:'יומן ביקורת',group:'מערכת',icon:'≣',title:'יומן ביקורת',render:renderAudit},
  ];
  var QUICK=[
    {label:'רענן את כל הנתונים',run:function(){ route(true); }},
    {label:'החלף מצב כהה/בהיר',run:toggleTheme},
    {label:'פתח את הפאנל הקלאסי (admin.html)',run:function(){ location.href='/admin'; }},
  ];

  // ───────── nav build ─────────
  function buildNav(){
    var groups={}; SECTIONS.forEach(function(s){ (groups[s.group]=groups[s.group]||[]).push(s); });
    var html=Object.keys(groups).map(function(g){
      return '<div class="px-1 pt-2 pb-1 text-[10px] font-bold uppercase tracking-wide text-ink-400">'+esc(g)+'</div>'+
        groups[g].map(function(s){ return '<a class="navlink" data-id="'+s.id+'" href="#/'+s.id+'"><span class="w-4 text-center text-ink-400">'+s.icon+'</span><span class="flex-1">'+esc(s.label)+'</span></a>'; }).join('');
    }).join('');
    $('#nav').innerHTML=html;
  }
  function setActiveNav(id){ document.querySelectorAll('#nav .navlink').forEach(function(a){ a.classList.toggle('active', a.getAttribute('data-id')===id); }); }

  // ───────── router ─────────
  function currentId(){ var h=(location.hash||'').replace(/^#\/?/,''); return h; }
  async function route(force){
    var id=currentId();
    var view=$('#view');
    // Deep-link, refresh-safe detail pages (e.g. #/user/<sub>) — like the SRC admin's detail routes.
    if(id.indexOf('user/')===0){
      var sub=decodeURIComponent(id.slice(5));
      $('#pageTitle').textContent='פרטי משתמש'; setActiveNav('users'); closeDrawer();
      view.innerHTML=sectionTitle('פרטי משתמש')+loading();
      try { await renderUserDetail(view,sub); } catch(e){ view.innerHTML=sectionTitle('פרטי משתמש')+errState(e); }
      return;
    }
    var sec=SECTIONS.filter(function(s){return s.id===id;})[0]||SECTIONS[0];
    $('#pageTitle').textContent=sec.title;
    setActiveNav(sec.id);
    closeDrawer();
    view.innerHTML=sectionTitle(sec.title)+loading();
    try { await sec.render(view); }
    catch(e){ view.innerHTML=sectionTitle(sec.title)+errState(e); }
  }

  // ───────── SECTION: Overview (KPIs + decision feed) ─────────
  async function renderOverview(view){
    view.innerHTML=sectionTitle('סקירה','מבט מהיר על מצב המערכת — מה דורש את תשומת הלב שלך עכשיו')+'<div id="ov-kpi">'+loading()+'</div>'+
      '<div id="ov-trends" class="mt-6"></div>'+
      '<div class="mt-6 grid gap-4 lg:grid-cols-3"><div class="lg:col-span-2"><h3 class="font-display text-lg mb-3">דורש תשומת לב</h3><div id="ov-decisions"></div></div><div><h3 class="font-display text-lg mb-3">נרשמו לאחרונה</h3><div id="ov-signups"></div></div></div>';
    // KPIs (revenue + activation + registration-health + errors) in parallel — each fails soft
    var rev=adminGet('/api/admin/revenue').catch(function(){return null;});
    var act=adminGet('/api/admin/activation-summary?days=30').catch(function(){return null;});
    var reg=adminGet('/api/admin?action=registration-health').catch(function(){return null;});
    var err=adminGet('/api/admin?action=errors-count').catch(function(){return null;});
    var anl=adminGet('/api/admin?action=analytics&days=14').catch(function(){return null;});
    var R=await rev, A=await act, G=await reg, E=await err, AN=await anl;
    var cells=[];
    cells.push(kpi('משתמשים', R?num(R.counts&&R.counts.total):'—', R&&R.counts?num(R.counts.paid)+' משלמים · '+num(R.counts.trial)+' ניסיון':'—'));
    cells.push(kpi('MRR', R&&R.mrr?money(R.mrr.ils):'—', R&&R.arr?'ARR '+money(R.arr.ils):''));
    var verdict=A&&A.headline?A.headline.verdict:null; var vt=verdict==='OK'?'ok':verdict==='VALUE_PROBLEM'?'crit':'warn';
    cells.push(kpi('הפעלה (30 ימ׳)', A&&A.headline?A.headline.activation_rate_pct+'%':'—', verdict?'מסקנה: '+verdict:'', vt));
    var orph=G?(G.orphanCount||0):null;
    cells.push(kpi('יתומים (ללא גיליון)', orph==null?'—':num(orph), orph?'דורש תיקון':'תקין', orph?'crit':'ok'));
    $('#ov-kpi').innerHTML='<div class="grid gap-3 sm:grid-cols-2 lg:grid-cols-4">'+cells.join('')+'</div>';
    // 14-day trend strip — real durable analytics counters (90-day retention); empty/auth states stay honest
    if(AN&&AN.days&&AN.days.length){
      var ser=function(ev){ return AN.days.map(function(d){ return (d.events&&d.events[ev])||0; }); };
      var sSignup=ser('signup_complete'),sFirst=ser('first_message_received'),sViews=ser('page_view');
      var anyTrend=[sSignup,sFirst,sViews].some(function(a){ return a.some(function(v){return v>0;}); });
      $('#ov-trends').innerHTML='<h3 class="font-display text-lg mb-3">מגמות 14 ימים</h3>'+(anyTrend?'<div class="grid gap-3 sm:grid-cols-3">'+trendCard('הרשמות שהושלמו',sSignup)+trendCard('הוצאה ראשונה לבוט',sFirst)+trendCard('צפיות בדף הנחיתה',sViews)+'</div>':emptyState('עדיין אין נתוני מגמה (נאספים מרגע שמשתמשים מתחילים להגיע)'));
    }
    // Decision feed — synthesize ranked "attention" items from the same data
    var items=[];
    if(G&&G.orphanCount>0) items.push({sev:'crit',head:num(G.orphanCount)+' משתמשים ללא גיליון',sub:'נרשמו אך הגיליון לא נוצר — לא יכולים לרשום הוצאה',to:'#/data-integrity'});
    if(G&&G.brokenPhoneCount>0) items.push({sev:'crit',head:num(G.brokenPhoneCount)+' מיפויי טלפון שבורים',sub:'הטלפון מצביע על גיליון לא נכון',to:'#/data-integrity'});
    if(G&&G.pendingPhoneLinkCount>0) items.push({sev:'warn',head:num(G.pendingPhoneLinkCount)+' ממתינים לקישור טלפון',sub:'יש גיליון אך הטלפון לא קושר עדיין',to:'#/data-integrity'});
    if(A&&A.headline&&A.headline.verdict==='VALUE_PROBLEM') items.push({sev:'crit',head:'בעיית ערך בהפעלה',sub:'מספיק משתמשים מקושרים אך פחות מ-30% חוזרים',to:'#/activation'});
    if(A&&A.headline&&A.headline.verdict==='PLUMBING') items.push({sev:'warn',head:'בעיית צנרת בהפעלה',sub:'רוב הנרשמים תקועים לפני קישור — תקן את האונבורדינג',to:'#/activation'});

    try {
      var d=await adminGet('/api/admin?action=jobs'); var jobs=(d&&d.jobs)||[];
      view.innerHTML+= jobs.length ? '<div class="card overflow-hidden"><table class="w-full text-sm"><thead class="bg-ink-50 dark:bg-ink-800 text-ink-400"><tr><th class="p-3 text-right">סוג</th><th class="p-3 text-right">ניסיונות</th><th class="p-3 text-right">שגיאה</th></tr></thead><tbody>'+jobs.map(function(j){ return '<tr class="border-t border-ink-100 dark:border-ink-700"><td class="p-3">'+esc(j.type||j.id)+'</td><td class="p-3">'+num(j.attempts)+'</td><td class="p-3 text-xs text-red-500">'+esc(j.lastError||'')+'</td></tr>'; }).join('')+'</tbody></table></div>' : card('<div class="py-4 text-center text-sm text-green-600">אין משרות תקועות ✓</div>');
    } catch(e){ view.innerHTML+=errState(e); }
    view.innerHTML+='<div class="mt-4">'+card('<div class="text-sm font-semibold mb-2">טיוטת שידור "מה חדש"</div><div class="text-xs text-ink-400 mb-3">מנסח את ההודעה שתישלח לכל המשתמשים בוואטסאפ. השמירה כאן רק מכינה טיוטה — השליחה בפועל מתבצעת ע"י ה-cron עם אישור נפרד.</div><textarea id="digestText" rows="3" class="w-full rounded-xl border border-ink-100 dark:border-ink-700 bg-white dark:bg-ink-800 px-3 py-2 text-sm" placeholder="תוכן ההודעה (לפחות 20 תווים)..."></textarea><div class="mt-2 flex items-center gap-2"><button id="digestBtn" class="rounded-xl bg-brand-600 px-4 py-2 text-sm font-semibold text-white">שמור טיוטה</button> <span id="digestMsg" class="text-xs text-ink-400"></span></div>')+'</div>';
    (function(){ var dt=$('#digestText'); adminPost('/api/admin/customer-digest-set',{action:'get'}).then(function(r){ if(dt&&r&&r.current&&r.current.body) dt.value=r.current.body; }).catch(function(){}); })();
    var db=$('#digestBtn'); if(db) db.onclick=async function(){ var msg=($('#digestText').value||'').trim(); if(msg.length<20){ $('#digestMsg').textContent='ההודעה קצרה מדי (לפחות 20 תווים)'; return; } if(!confirm('לשמור טיוטת שידור לכל המשתמשים?')) return; try { var r=await adminPost('/api/admin/customer-digest-set',{action:'set',body:msg}); $('#digestMsg').textContent=(r&&r.ok)?'נשמרה טיוטה ✓ ('+num(r.length)+' תווים)':'נכשל'; } catch(e){ $('#digestMsg').textContent='שגיאה: '+(e.message||e); } };
  }

  // ───────── SECTION: Feature Flags ─────────
  async function renderFlags(view){
    view.innerHTML=sectionTitle('דגלי פיצ׳רים','הפעלה/כיבוי של יכולות ללא דיפלוי');
    try {
      var d=await adminGet('/api/admin?action=feature-flags'); var flags=(d&&d.flags)||{};
      var keys=Object.keys(flags);
      view.innerHTML+= keys.length ? '<div class="card divide-y divide-ink-100 dark:divide-ink-700">'+keys.map(function(k){ var on=!!flags[k]; return '<div class="flex items-center justify-between p-3"><span class="text-sm font-medium">'+esc(k)+'</span><button class="flag rounded-full px-3 py-1 text-xs font-semibold '+(on?'bg-green-100 text-green-700 dark:bg-green-900/40 dark:text-green-300':'bg-ink-100 text-ink-500 dark:bg-ink-700')+'" data-k="'+esc(k)+'" data-v="'+(on?'1':'0')+'">'+(on?'פעיל':'כבוי')+'</button></div>'; }).join('')+'</div>' : emptyState('אין דגלים מוגדרים');
      document.querySelectorAll('.flag').forEach(function(b){ b.onclick=async function(){ var nv=b.getAttribute('data-v')==='1'?false:true; try { await adminPost('/api/admin?action=feature-flag-set',{key:b.getAttribute('data-k'),value:nv}); renderFlags(view); } catch(e){ alert(e.message||e); } }; });
    } catch(e){ view.innerHTML+=errState(e); }
  }

  // ───────── SECTION: Audit log ─────────
  async function renderAudit(view){
    view.innerHTML=sectionTitle('יומן ביקורת','כל פעולות הניהול נרשמות');
    try { var d=await adminGet('/api/admin?action=audit&limit=50'); var ev=(d&&d.events)||[]; view.innerHTML+=ev.length?'<div class="card divide-y divide-ink-100 dark:divide-ink-700">'+ev.map(function(e){ return '<div class="flex items-center gap-3 p-3 text-sm"><span class="text-ink-400 text-[11px] w-20">לפני '+ago(e.ts||e.at)+'</span><span>'+esc(e.action||e.type||'')+'</span><span class="text-ink-400 text-xs flex-1 truncate">'+esc(e.actor||e.target||e.subHash||'')+'</span></div>'; }).join('')+'</div>':emptyState('אין רשומות ביקורת'); }
    catch(e){ view.innerHTML+=errState(e); }
  }

  // ───────── always-on agent workforce (client-side, like the SRC runner) ─────────
  var DISMISS_KEY='kfl_admin_dismissed';
  function dismissed(){ try { return JSON.parse(localStorage.getItem(DISMISS_KEY)||'{}'); } catch(e){ return {}; } }
  function setDismissed(k){ var d=dismissed(); d[k]=Date.now(); localStorage.setItem(DISMISS_KEY,JSON.stringify(d)); }
  var AGENTS=[
    {id:'integrity',name:'שלמות נתונים',emoji:'⛃',schedule:'כל שעה',run:async function(){
      var d=await adminGet('/api/admin?action=registration-health'); var f=[];
      if(d.orphanCount>0) f.push({sev:'crit',head:d.orphanCount+' משתמשים ללא גיליון',detail:'נרשמו אך הגיליון לא נוצר — אינם יכולים לרשום הוצאה',to:'#/data-integrity'});
      if(d.brokenPhoneCount>0) f.push({sev:'crit',head:d.brokenPhoneCount+' מיפויי טלפון שבורים',detail:'הטלפון מצביע על גיליון לא נכון',to:'#/data-integrity'});
      if(d.pendingPhoneLinkCount>0) f.push({sev:'warn',head:d.pendingPhoneLinkCount+' ממתינים לקישור טלפון',detail:'יש גיליון אך הטלפון לא קושר עדיין',to:'#/data-integrity'});
      return f;
    }},
    {id:'activation',name:'הפעלה ושימור',emoji:'↗',schedule:'יומי',run:async function(){
      var d=await adminGet('/api/admin/activation-summary?days=30'); var h=d.headline||{}; var f=[];
      if(h.verdict==='VALUE_PROBLEM') f.push({sev:'crit',head:'בעיית ערך בהפעלה',detail:'מספיק משתמשים מקושרים אך פחות מ-30% חוזרים — בעיה אמיתית בערך, לא בצנרת',to:'#/activation'});
      else if(h.verdict==='PLUMBING') f.push({sev:'warn',head:'בעיית צנרת בהפעלה',detail:'רוב הנרשמים תקועים לפני קישור — תקן את האונבורדינג',to:'#/activation'});
      return f;
    }},
    {id:'bot',name:'בריאות הבוט',emoji:'♥',schedule:'כל שעה',run:async function(){
      var f=[];
      var v=await adminGet('/api/admin/bot-version').catch(function(){return null;});
      var e=await adminGet('/api/admin?action=errors-count').catch(function(){return null;});
      var c=await adminGet('/api/admin/config-drift').catch(function(){return null;});
      if(v&&v.drift===true) f.push({sev:'warn',head:'גרסת הבוט אינה תואמת ל-repo',detail:'חי: '+(v.deployed_version||'')+' · repo: '+(v.repo_version||'')+' — צריך הדבקה מחדש',to:'#/bot-health'});
      if(e&&e.errors_24h>20) f.push({sev:'crit',head:e.errors_24h+' שגיאות ב-24 שעות',detail:'בדוק את לוגי הבוט',to:'#/bot-health'});
      if(c&&c.drift===true) f.push({sev:'crit',head:'סחיפת קונפיג ('+num(c.mismatchCount||1)+')',detail:'ערכים קשיחים שלא תואמים לקונפיג — יכול לשבור פעולות',to:'#/bot-health'});
      return f;
    }},
    {id:'revenue',name:'הכנסות ונטישה',emoji:'₪',schedule:'יומי',run:async function(){
      var d=await adminGet('/api/admin/revenue'); var f=[];
      if(d.churn&&d.churn.monthly_churn_rate_pct>8) f.push({sev:'warn',head:'נטישה גבוהה: '+d.churn.monthly_churn_rate_pct+'%',detail:(d.churn.cancellations_last_30d||0)+' ביטולים ב-30 ימ׳',to:'#/revenue'});
      return f;
    }},
    {id:'funnel',name:'משפך הרשמה',emoji:'⧗',schedule:'יומי',run:async function(){
      var d=await adminGet('/api/admin/funnel-summary'); var f=[];
      if(d.biggest_leak&&d.biggest_leak.dropoff_pct>0.4) f.push({sev:'warn',head:'דליפה במשפך: '+(d.biggest_leak.label||d.biggest_leak.step||''),detail:Math.round(d.biggest_leak.dropoff_pct*100)+'% נושרים בשלב הזה',to:'#/funnel'});
      return f;
    }},
    {id:'signals',name:'תיבת סיגנלים',emoji:'⚑',schedule:'כל שעה',run:async function(){
      var d=await adminGet('/api/admin/inbox?limit=50'); var n=((d&&d.items)||[]).length; var f=[];
      if(n>0) f.push({sev:n>10?'warn':'info',head:n+' סיגנלים פתוחים',detail:'דוחות משתמשים / סקרים שדורשים מענה',to:'#/needs-review'});
      return f;
    }},
  ];
  var agentState={results:{},ranAt:null,running:false};
  function agentValue(findings){ return (findings||[]).reduce(function(s,x){return s+(x.sev==='crit'?3:x.sev==='warn'?1:0);},0); }
  async function runAgents(){
    if(agentState.running) return; agentState.running=true;
    await Promise.all(AGENTS.map(function(a){ return Promise.resolve().then(a.run).then(function(fnd){ agentState.results[a.id]={findings:fnd||[],error:null,ranAt:Date.now()}; }).catch(function(e){ agentState.results[a.id]={findings:[],error:(e&&e.isAuth?'auth':(e.message||'error')),ranAt:Date.now()}; }); }));
    agentState.ranAt=Date.now(); agentState.running=false;
    try { window.dispatchEvent(new CustomEvent('kfl-agents-updated')); } catch(e){}
  }
  var _agentTimer=null;
  function startAgents(){ runAgents(); if(_agentTimer) clearInterval(_agentTimer); _agentTimer=setInterval(runAgents,5*60*1000); }
  async function renderMyAgents(view){
    view.innerHTML=sectionTitle('הסוכנים שלי','צוות סוכנים שרץ ברקע כל 5 דקות, סורק את המערכת ומציף מה שדורש טיפול — לא תרשים נוי, חדר החלטות')+'<div id="agentsBody">'+loading()+'</div>';
    function paint(){
      var all=[]; AGENTS.forEach(function(a){ var r=agentState.results[a.id]; if(r&&r.findings) r.findings.forEach(function(f){ all.push({a:a,f:f}); }); });
      var dis=dismissed(); var live=all.filter(function(x){ return !dis[x.a.id+':'+x.f.head]; });
      var order={crit:0,warn:1,info:2}; live.sort(function(p,q){return order[p.f.sev]-order[q.f.sev];});
      var anyRan=Object.keys(agentState.results).length>0;
      var allAuth=anyRan && AGENTS.every(function(a){ var r=agentState.results[a.id]; return r&&r.error==='auth'; });
      var head='<div class="card p-4 mb-5 flex flex-wrap items-center gap-5">'+
        '<div><div class="text-xs text-ink-400">פתוחים</div><div class="font-display text-3xl">'+live.length+'</div></div>'+
        '<div><div class="text-xs text-ink-400">דחופים</div><div class="font-display text-3xl text-red-500">'+live.filter(function(x){return x.f.sev==='crit';}).length+'</div></div>'+
        '<div class="flex-1 text-xs text-ink-400">ריצה אחרונה: '+(agentState.ranAt?'לפני '+ago(agentState.ranAt):'…')+' · רצים אוטומטית כל 5 דק׳</div>'+
        '<button id="runAll" class="rounded-xl bg-brand-600 px-4 py-2 text-sm font-semibold text-white">הרץ עכשיו</button></div>';
      var feed= allAuth ? errState(AuthError()) : (live.length ? live.map(function(x){ return '<div class="card mb-2 flex items-start gap-3 p-3">'+pill(x.f.sev==='crit'?'דחוף':x.f.sev==='warn'?'לטיפול':'מידע',x.f.sev)+'<div class="flex-1 min-w-0"><div class="text-sm font-semibold">'+x.a.emoji+' '+esc(x.f.head)+'</div><div class="text-xs text-ink-400">'+esc(x.f.detail||'')+'</div></div><a class="text-brand-600 text-xs whitespace-nowrap" href="'+x.f.to+'">פתח</a><button class="dis text-ink-300 text-xs whitespace-nowrap" data-k="'+esc(x.a.id+':'+x.f.head)+'">סמן כטופל</button></div>'; }).join('') : card('<div class="py-6 text-center text-sm text-green-600">אין ממצאים פתוחים ✓ הכל תקין</div>'));
      var cards='<div class="grid gap-3 sm:grid-cols-2 lg:grid-cols-3">'+AGENTS.map(function(a){ var r=agentState.results[a.id]||{findings:[]}; var v=agentValue(r.findings); var lbl=r.error==='auth'?'דרוש אדמין':(r.error?'שגיאה':(r.findings.length+' ממצאים')); return '<div class="card p-4"><div class="flex items-center gap-2"><span class="text-lg">'+a.emoji+'</span><span class="font-semibold flex-1">'+esc(a.name)+'</span><button class="runOne text-xs text-brand-600" data-id="'+a.id+'">הרץ</button></div><div class="mt-2 flex flex-wrap items-center gap-2 text-xs text-ink-400"><span>'+esc(lbl)+'</span><span>·</span><span>ציון ערך '+v+'</span><span>·</span><span>'+esc(a.schedule)+'</span></div></div>'; }).join('')+'</div>';
      $('#agentsBody').innerHTML=head+'<h3 class="font-display text-lg mb-3">ממצאים פתוחים</h3>'+feed+'<h3 class="font-display text-lg mt-6 mb-3">צוות הסוכנים</h3>'+cards;
      var ra=$('#runAll'); if(ra) ra.onclick=async function(){ ra.textContent='...'; await runAgents(); paint(); };
      document.querySelectorAll('.runOne').forEach(function(b){ b.onclick=async function(){ b.textContent='...'; await runAgents(); paint(); }; });
      document.querySelectorAll('.dis').forEach(function(b){ b.onclick=function(){ setDismissed(b.getAttribute('data-k')); paint(); }; });
    }
    if(!agentState.ranAt) await runAgents();
    paint();
  }

  // ───────── command bar ─────────
  function openCmd(){ $('#cmd').classList.remove('hidden'); $('#cmdInput').value=''; renderCmd(''); $('#cmdInput').focus(); }
  function closeCmd(){ $('#cmd').classList.add('hidden'); }
  function renderCmd(q){
    q=(q||'').trim().toLowerCase();
    var secHits=SECTIONS.filter(function(s){ return !q||s.label.toLowerCase().indexOf(q)>=0||s.title.toLowerCase().indexOf(q)>=0; }).map(function(s){ return {label:s.label,kind:'מסך',go:'#/'+s.id}; });
    var actHits=QUICK.filter(function(a){ return !q||a.label.toLowerCase().indexOf(q)>=0; }).map(function(a){ return {label:a.label,kind:'פעולה',run:a.run}; });
    var all=actHits.concat(secHits).slice(0,12);
    $('#cmdList').innerHTML=all.length?all.map(function(it,i){ return '<div class="cmdrow flex items-center gap-3 px-4 py-2.5 cursor-pointer hover:bg-ink-50 dark:hover:bg-ink-800'+(i===0?' bg-ink-50 dark:bg-ink-800':'')+'" data-i="'+i+'"><span class="flex-1 text-sm">'+esc(it.label)+'</span>'+pill(it.kind,'neutral')+'</div>'; }).join(''):'<div class="px-4 py-6 text-center text-sm text-ink-400">לא נמצא</div>';
    window.__cmd=all;
    document.querySelectorAll('.cmdrow').forEach(function(r){ r.onclick=function(){ runCmd(parseInt(r.getAttribute('data-i'),10)); }; });
  }
  function runCmd(i){ var it=(window.__cmd||[])[i]; if(!it) return; closeCmd(); if(it.run) it.run(); else if(it.go) location.hash=it.go; }

  // ───────── theme + drawer ─────────
  function applyTheme(t){ document.documentElement.classList.toggle('dark', t==='dark'); }
  function toggleTheme(){ var t=document.documentElement.classList.contains('dark')?'light':'dark'; localStorage.setItem('kfl_admin_theme',t); applyTheme(t); }
  function openDrawer(){ $('#sidebar').classList.remove('hidden'); $('#sidebar').classList.add('flex'); $('#backdrop').classList.remove('hidden'); }
  function closeDrawer(){ if(window.innerWidth<768){ $('#sidebar').classList.add('hidden'); $('#sidebar').classList.remove('flex'); $('#backdrop').classList.add('hidden'); } }

  // ───────── boot ─────────
  (function(){
    applyTheme(localStorage.getItem('kfl_admin_theme')|| (window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'));
    try { var u=JSON.parse(localStorage.getItem('kesefle_user')||'{}'); if(u&&u.email) $('#whoami').textContent=u.email; } catch(e){}
    $('#srcStamp').textContent=new Date().toLocaleString('he-IL');
    buildNav();
    $('#menuBtn').onclick=openDrawer; $('#backdrop').onclick=closeDrawer;
    $('#cmdBtn').onclick=openCmd; $('#themeBtn').onclick=toggleTheme; $('#refreshBtn').onclick=function(){ route(true); };
    $('#cmdInput').addEventListener('input',function(e){ renderCmd(e.target.value); });
    $('#cmd').addEventListener('click',function(e){ if(e.target===$('#cmd')) closeCmd(); });
    document.addEventListener('keydown',function(e){ if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){ e.preventDefault(); openCmd(); } if(e.key==='Escape'){ closeCmd(); } if(e.key==='Enter'&&!$('#cmd').classList.contains('hidden')){ runCmd(0); } });
    window.addEventListener('hashchange',function(){ route(); });
    if(!location.hash) location.hash='#/';
    route();
    startAgents(); // always-on agent workforce: runs now + every 5 min while the console is open
  })();
  </script>
</body>
</html>
